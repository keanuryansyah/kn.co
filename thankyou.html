<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Message Sent — KN.co</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: #ffffff;
        color: #111;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wrapper {
        max-width: 520px;
        padding: 40px;
        text-align: center;
      }

      .logo {
        font-weight: 600;
        font-size: 18px;
        margin-bottom: 50px;
      }

      .success {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #16a34a;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        margin: auto;
        margin-bottom: 30px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 15px;
        font-weight: 600;
      }

      .desc {
        color: #555;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .meta {
        font-size: 14px;
        color: #777;
        margin-bottom: 40px;
      }

      .actions {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        padding: 12px 22px;
        border-radius: 8px;
        font-size: 14px;
        text-decoration: none;
        transition: 0.2s;
      }

      .btn-primary {
        background: #111;
        color: white;
      }

      .btn-primary:hover {
        background: #000;
      }

      .btn-outline {
        border: 1px solid #ddd;
        color: #111;
      }

      .btn-outline:hover {
        background: #f5f5f5;
      }

      .footer {
        margin-top: 60px;
        font-size: 13px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="logo">KN.co</div>

      <div class="success">✓</div>

      <h1>Message Sent</h1>

      <p class="desc">
        Your message has been successfully submitted. I'll review your project
        details and get back to you shortly.
      </p>

      <p class="meta">
        Average response time: <strong>within 24 hours</strong>
      </p>

      <div class="actions">
        <a href="https://wa.me/6289517028180" class="btn btn-primary">
          WhatsApp Me
        </a>

        <a href="/" class="btn btn-outline"> Back to Homepage </a>
      </div>

      <div class="footer">Working remotely worldwide</div>
    </div>

    <script>
      if (!sessionStorage.getItem("formSubmitted")) {
        window.location.href = "/";
      }
    </script>
  </body>
</html>
